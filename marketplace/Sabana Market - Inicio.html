  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"es\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Sabana Market — Inicio<\u002Ftitle>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  \n  <script src=\"0507980a-e868-4dc2-8a7c-a52bc09f07a4\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<nav id=\"nav\"><\u002Fnav>\n\n<!-- HERO -->\n<section id=\"hero\">\n  <div class=\"hero-inner container\">\n    <div class=\"hero-text\">\n      <div class=\"hero-eyebrow\">Marketplace Institucional<\u002Fdiv>\n      <h1 class=\"hero-title\">Compra y vende dentro<br>de <em>La Sabana<\u002Fem><\u002Fh1>\n      <p class=\"hero-desc\">El espacio seguro de la comunidad estudiantil para intercambiar libros, tutorías, servicios y más — solo con correo @unisabana.edu.co<\u002Fp>\n      <div class=\"hero-search-wrap\">\n        <input type=\"text\" id=\"hero-search\" placeholder=\"¿Qué estás buscando?\" class=\"hero-search-input\">\n        <button class=\"hero-search-btn btn btn-gold-solid\" onclick=\"goSearch()\">Buscar<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"hero-tags\">\n        <span onclick=\"goSearch('Cálculo')\">📘 Cálculo<\u002Fspan>\n        <span onclick=\"goSearch('tutoria')\">🎓 Tutorías<\u002Fspan>\n        <span onclick=\"goSearch('laboratorio')\">🧪 Lab<\u002Fspan>\n        <span onclick=\"goSearch('diseño')\">✏️ Diseño<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-stats\">\n      <div class=\"stat-card\">\n        <div class=\"stat-num\" data-target=\"247\">0<\u002Fdiv>\n        <div class=\"stat-label\">Productos activos<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-card\">\n        <div class=\"stat-num\" data-target=\"1340\">0<\u002Fdiv>\n        <div class=\"stat-label\">Estudiantes registrados<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-card\">\n        <div class=\"stat-num\" data-target=\"98\">0<\u002Fdiv>\n        <div class=\"stat-label\">% satisfacción<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CATEGORIES -->\n<section class=\"section\">\n  <div class=\"container\">\n    <h2 class=\"section-title\">Explorar por categoría<\u002Fh2>\n    <p class=\"section-sub\">Todo lo que necesitas para tu semestre en un solo lugar<\u002Fp>\n    <div class=\"categories-grid\" id=\"categories-grid\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FEATURED PRODUCTS -->\n<section class=\"section\" style=\"background:#fff; padding: 64px 0;\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div>\n        <h2 class=\"section-title\">Productos destacados<\u002Fh2>\n        <p class=\"section-sub\">Lo más reciente y popular de la comunidad<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"02_listing.html\" class=\"btn btn-secondary\">Ver todos →<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"grid-4\" id=\"products-grid\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CTA BANNER -->\n<section class=\"section\">\n  <div class=\"container\">\n    <div class=\"cta-banner\">\n      <div class=\"cta-text\">\n        <h2>¿Tienes algo que vender o<br><em>un servicio que ofrecer?<\u002Fem><\u002Fh2>\n        <p>Publica gratis en menos de 2 minutos y llega a más de 1.300 estudiantes de La Sabana<\u002Fp>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap;\">\n          <button class=\"btn btn-gold-solid btn-lg\" onclick=\"window.location.href='07_publish.html'\">✨ Publicar ahora<\u002Fbutton>\n          <button class=\"btn btn-secondary btn-lg\" style=\"border-color:rgba(255,255,255,0.4);color:#fff;\" onclick=\"window.location.href='02_listing.html'\">Explorar mercado<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cta-illo\">\n        <div class=\"cta-float f1\">📚<\u002Fdiv>\n        <div class=\"cta-float f2\">💰<\u002Fdiv>\n        <div class=\"cta-float f3\">🎓<\u002Fdiv>\n        <div class=\"cta-float f4\">⭐<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- RECENT SERVICES -->\n<section class=\"section\" style=\"background:#fff;padding:64px 0;\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div>\n        <h2 class=\"section-title\">Servicios recientes<\u002Fh2>\n        <p class=\"section-sub\">Estudiantes ofreciendo sus talentos<\u002Fp>\n      <\u002Fdiv>\n      <a href=\"02_listing.html?cat=servicios\" class=\"btn btn-secondary\">Ver servicios →<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"grid-3\" id=\"services-grid\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer id=\"footer\"><\u002Ffooter>\n\n<style>\n/* Hero */\n#hero { background: linear-gradient(135deg, #1A3A6B 0%, #2C5FA8 60%, #1A3A6B 100%); padding: 80px 0 64px; overflow: hidden; position: relative; }\n#hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 70% 50%, rgba(201,168,76,0.12) 0%, transparent 60%); }\n.hero-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; position: relative; z-index: 1; }\n.hero-eyebrow { display: inline-block; background: rgba(201,168,76,0.2); color: var(--gold-light); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; padding: 5px 14px; border-radius: 20px; margin-bottom: 16px; border: 1px solid rgba(201,168,76,0.3); }\n.hero-title { font-size: 52px; color: #fff; line-height: 1.1; margin-bottom: 16px; }\n.hero-title em { color: var(--gold-light); }\n.hero-desc { color: rgba(255,255,255,0.75); font-size: 16px; line-height: 1.7; margin-bottom: 28px; max-width: 460px; }\n.hero-search-wrap { display: flex; gap: 0; margin-bottom: 20px; max-width: 480px; }\n.hero-search-input { flex: 1; padding: 14px 20px; border: none; border-radius: 10px 0 0 10px; font-family: var(--font-sans); font-size: 15px; outline: none; }\n.hero-search-btn { border-radius: 0 10px 10px 0; padding: 14px 24px; font-size: 15px; }\n.hero-tags { display: flex; gap: 10px; flex-wrap: wrap; }\n.hero-tags span { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.85); font-size: 13px; padding: 6px 14px; border-radius: 20px; cursor: pointer; transition: background 0.2s; border: 1px solid rgba(255,255,255,0.15); }\n.hero-tags span:hover { background: rgba(255,255,255,0.2); }\n\n/* Stats */\n.hero-stats { display: flex; flex-direction: column; gap: 16px; }\n.stat-card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 24px 28px; backdrop-filter: blur(8px); transition: transform 0.2s; }\n.stat-card:hover { transform: translateX(4px); }\n.stat-num { font-size: 42px; font-weight: 700; color: var(--gold-light); line-height: 1; font-family: var(--font-sans); }\n.stat-label { font-size: 13px; color: rgba(255,255,255,0.65); margin-top: 4px; }\n\n/* Categories */\n.categories-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }\n.cat-card { border-radius: var(--radius); padding: 28px 20px; text-align: center; cursor: pointer; transition: transform 0.22s, box-shadow 0.22s; border: 1px solid var(--border); }\n.cat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-md); }\n.cat-icon { font-size: 48px; margin-bottom: 12px; display: block; }\n.cat-name { font-weight: 700; font-size: 15px; color: var(--blue-dark); margin-bottom: 4px; }\n.cat-count { font-size: 12px; color: var(--muted); }\n\n/* Section header */\n.section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; }\n\n/* Product card add btn */\n.add-cart-btn { background: var(--blue-dark); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; font-family: var(--font-sans); }\n.add-cart-btn:hover { background: var(--blue-mid); }\n\n/* CTA Banner */\n.cta-banner { background: linear-gradient(135deg, #1A3A6B 0%, #2C5FA8 100%); border-radius: 20px; padding: 56px 64px; display: flex; align-items: center; justify-content: space-between; gap: 40px; overflow: hidden; position: relative; }\n.cta-banner::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 80% 50%, rgba(201,168,76,0.15) 0%, transparent 55%); }\n.cta-text { position: relative; z-index: 1; }\n.cta-text h2 { font-size: 38px; color: #fff; margin-bottom: 14px; }\n.cta-text em { color: var(--gold-light); }\n.cta-text p { color: rgba(255,255,255,0.75); font-size: 15px; margin-bottom: 28px; max-width: 420px; line-height: 1.6; }\n.cta-illo { position: relative; width: 200px; height: 160px; flex-shrink: 0; }\n.cta-float { position: absolute; font-size: 40px; animation: floatAnim 3s ease-in-out infinite; }\n.f1 { top: 0; left: 20px; animation-delay: 0s; }\n.f2 { top: 40px; right: 0; animation-delay: 0.8s; }\n.f3 { bottom: 10px; left: 0; animation-delay: 1.6s; }\n.f4 { bottom: 20px; right: 30px; animation-delay: 2.4s; }\n@keyframes floatAnim { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }\n\n/* Service card */\n.service-card { border-radius: var(--radius); padding: 24px; background: #fff; border: 1px solid var(--border); cursor: pointer; transition: transform 0.22s, box-shadow 0.22s; }\n.service-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }\n.service-card-top { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }\n.service-card-icon { font-size: 36px; width: 56px; height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }\n.service-card-title { font-weight: 700; font-size: 15px; color: var(--blue-dark); margin-bottom: 4px; }\n.service-card-seller { font-size: 12px; color: var(--muted); }\n.service-card-desc { font-size: 13px; color: var(--text); line-height: 1.5; margin-bottom: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }\n.service-card-footer { display: flex; align-items: center; justify-content: space-between; }\n.service-price { font-size: 18px; font-weight: 700; color: var(--blue-dark); }\n\n@media(max-width:900px){\n  .hero-inner { grid-template-columns: 1fr; }\n  .hero-stats { flex-direction: row; flex-wrap: wrap; }\n  .categories-grid { grid-template-columns: repeat(3,1fr); }\n}\n<\u002Fstyle>\n\n<script>\ninitPage('home');\n\nfunction goSearch(q) {\n  const query = q || document.getElementById('hero-search').value;\n  window.location.href = '02_listing.html' + (query ? '?q=' + encodeURIComponent(query) : '');\n}\n\ndocument.getElementById('hero-search').addEventListener('keydown', e => {\n  if (e.key === 'Enter') goSearch();\n});\n\n// Render categories\nconst catGrid = document.getElementById('categories-grid');\ncatGrid.innerHTML = CATEGORIES.map(c => `\n  <div class=\"cat-card\" style=\"background:${c.color}\" onclick=\"window.location.href='02_listing.html?cat=${c.id}'\">\n    <span class=\"cat-icon\">${c.emoji}<\u002Fspan>\n    <div class=\"cat-name\">${c.name}<\u002Fdiv>\n    <div class=\"cat-count\">${c.count} publicaciones<\u002Fdiv>\n  <\u002Fdiv>\n`).join('');\n\n// Render products\nconst products = State.products;\nconst prodGrid = document.getElementById('products-grid');\nprodGrid.innerHTML = products.slice(0, 4).map(p => renderProductCard(p)).join('');\n\n// Render services\nconst services = products.filter(p => p.category === 'servicios' || p.category === 'tutorias').slice(0, 3);\ndocument.getElementById('services-grid').innerHTML = services.map(p => `\n  <div class=\"service-card\" onclick=\"window.location.href='03_product.html?id=${p.id}'\">\n    <div class=\"service-card-top\">\n      <div class=\"service-card-icon\" style=\"background:${p.bg}\">${p.emoji}<\u002Fdiv>\n      <div>\n        <div class=\"service-card-title\">${p.title}<\u002Fdiv>\n        <div class=\"service-card-seller\">${p.sellerName} · ${p.sellerCareer}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"service-card-desc\">${p.description}<\u002Fdiv>\n    <div class=\"service-card-footer\">\n      <div class=\"service-price\">${formatPrice(p.price)}<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:4px;font-size:12px;color:var(--muted)\">\n        ${renderStars(p.rating)} <span>(${p.reviews})<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n`).join('');\n\nfunction renderProductCard(p) {\n  const badgeMap = { 'Nuevo': 'badge-nuevo', 'Popular': 'badge-popular', 'Oferta': 'badge-oferta' };\n  return `\n  <div class=\"card product-card\" onclick=\"window.location.href='03_product.html?id=${p.id}'\">\n    <div class=\"product-card-img\" style=\"background:${p.bg}\">\n      ${p.badge ? `<span class=\"badge ${badgeMap[p.badge]||'badge-popular'}\" style=\"position:absolute;top:12px;left:12px;\">${p.badge}<\u002Fspan>` : ''}\n      <span style=\"font-size:64px\">${p.emoji}<\u002Fspan>\n      ${p.stock === 0 ? `<span class=\"badge badge-agotado\" style=\"position:absolute;top:12px;right:12px;\">Agotado<\u002Fspan>` : ''}\n    <\u002Fdiv>\n    <div class=\"product-card-body\">\n      <div class=\"product-card-meta\">\n        <span class=\"badge ${p.estado==='nuevo'?'badge-nuevo':'badge-usado'}\">${p.estado==='nuevo'?'Nuevo':'Usado'}<\u002Fspan>\n        <span class=\"badge badge-popular\" style=\"background:#f4f6fb;color:var(--muted)\">${CATEGORIES.find(c=>c.id===p.category)?.name||p.category}<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"product-card-title\">${p.title}<\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:8px;margin-bottom:4px;\">\n        <span class=\"product-card-price\">${formatPrice(p.price)}<\u002Fspan>\n        ${p.priceOld ? `<span class=\"product-card-price-old\">${formatPrice(p.priceOld)}<\u002Fspan>` : ''}\n      <\u002Fdiv>\n      <div class=\"product-card-footer\">\n        <div class=\"product-card-rating\">\n          ${renderStars(p.rating)} <span style=\"margin-left:4px;\">${p.rating} (${p.reviews})<\u002Fspan>\n        <\u002Fdiv>\n        <button class=\"add-cart-btn\" onclick=\"event.stopPropagation();addToCart(${p.id})\" ${p.stock===0?'disabled':''}>\n          ${p.stock===0?'Agotado':'+ Carrito'}\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\nfunction addToCart(productId) {\n  const p = State.products.find(x => x.id === productId);\n  if (!p) return;\n  if (!State.user) { showToast('Inicia sesión para agregar al carrito', 'warning'); return; }\n  State.addToCart(p, 1);\n  showToast(`\"${p.title}\" agregado al carrito 🛒`, 'success');\n}\n\n// Animate stats\nfunction animateCounters() {\n  document.querySelectorAll('.stat-num[data-target]').forEach(el => {\n    const target = parseInt(el.dataset.target);\n    const suffix = el.dataset.target.endsWith('%') ? '%' : '';\n    let current = 0;\n    const step = Math.ceil(target / 60);\n    const timer = setInterval(() => {\n      current = Math.min(current + step, target);\n      el.textContent = current.toLocaleString('es-CO') + suffix;\n      if (current >= target) clearInterval(timer);\n    }, 25);\n  });\n}\n\n// Footer\ndocument.getElementById('footer').innerHTML = renderFooter();\n\n// Start animation after a short delay\nsetTimeout(animateCounters, 400);\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
