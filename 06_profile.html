<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil — Sabana Market</title>
  <script src="shared.js"></script>
</head>
<body>
<nav id="nav"></nav>

<div id="profile-root"></div>

<!-- REPORT MODAL -->
<div id="report-modal" class="modal-overlay" style="display:none;">
  <div class="modal" style="max-width:420px;">
    <div class="modal-header">
      <div class="modal-title">Reportar usuario</div>
      <button class="modal-close" onclick="document.getElementById('report-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Motivo del reporte</label>
        <select class="form-input" id="report-reason">
          <option value="">Selecciona un motivo</option>
          <option>Producto falso o engañoso</option>
          <option>Comportamiento inapropiado</option>
          <option>Spam o publicidad no autorizada</option>
          <option>Precios abusivos</option>
          <option>Otro</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Descripción (opcional)</label>
        <textarea class="form-input" id="report-desc" placeholder="Describe el problema..."></textarea>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="submitReport()">Enviar reporte</button>
    </div>
  </div>
</div>

<footer id="footer"></footer>

<style>
/* Profile header */
.profile-header { background: linear-gradient(160deg, #1A3A6B 0%, #2C5FA8 100%); padding: 56px 0 0; }
.profile-header-inner { max-width: var(--max-w); margin: 0 auto; padding: 0 40px; display: flex; align-items: flex-end; gap: 32px; }
.profile-avatar-wrap { position: relative; flex-shrink: 0; }
.profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 4px solid rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 52px; }
.profile-avatar-badge { position: absolute; bottom: 4px; right: 4px; background: var(--gold); color: var(--blue-dark); width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; border: 2px solid #fff; }
.profile-meta { flex: 1; padding-bottom: 28px; }
.profile-name { font-family: var(--font-serif); font-style: italic; font-size: 32px; color: #fff; margin-bottom: 4px; }
.profile-career { font-size: 15px; color: rgba(255,255,255,0.72); margin-bottom: 10px; }
.profile-stats-row { display: flex; gap: 28px; flex-wrap: wrap; }
.profile-stat { text-align: center; }
.profile-stat-val { font-size: 22px; font-weight: 700; color: #fff; }
.profile-stat-label { font-size: 11px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: .05em; }
.profile-actions { padding-bottom: 28px; display: flex; flex-direction: column; gap: 10px; }

/* Tabs */
.profile-tabs { background: #fff; border-bottom: 1px solid var(--border); }
.profile-tabs-inner { max-width: var(--max-w); margin: 0 auto; padding: 0 40px; display: flex; gap: 0; }
.profile-tab { padding: 16px 24px; font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap; }
.profile-tab:hover { color: var(--blue-dark); }
.profile-tab.active { color: var(--blue-dark); border-bottom-color: var(--blue-dark); }

/* Tab content */
.profile-content { max-width: var(--max-w); margin: 0 auto; padding: 40px 40px 80px; }

/* Order list */
.order-item { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; align-items: center; gap: 20px; margin-bottom: 12px; transition: box-shadow 0.2s; }
.order-item:hover { box-shadow: var(--shadow); }
.order-emoji { font-size: 36px; width: 56px; height: 56px; border-radius: 10px; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.order-info { flex: 1; }
.order-title { font-weight: 600; font-size: 15px; color: var(--text); margin-bottom: 4px; }
.order-meta { font-size: 13px; color: var(--muted); }
.order-price { font-size: 18px; font-weight: 700; color: var(--blue-dark); }

/* Config form */
.config-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; max-width: 520px; }
.config-card h3 { font-size: 18px; font-weight: 700; color: var(--blue-dark); margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }

.add-cart-btn { background: var(--blue-dark); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s; font-family: var(--font-sans); }
.add-cart-btn:hover { background: var(--blue-mid); }
</style>

<script>
initPage('profile');
document.getElementById('footer').innerHTML = renderFooter();

const urlParams = new URLSearchParams(window.location.search);
const profileId = urlParams.get('id') ? parseInt(urlParams.get('id')) : null;
const initTab = urlParams.get('tab') || 'productos';
const currentUser = State.user;

// Determine whose profile to show
const isOwn = !profileId || (currentUser && profileId === currentUser.id);
const profileUser = isOwn ? (currentUser || MOCK_USERS[99]) : (MOCK_USERS[profileId] || MOCK_USERS[2]);

if (!currentUser && isOwn) {
  window.location.href = '05_login.html?redirect=06_profile.html';
}

let activeTab = initTab;

function render() {
  const userProducts = State.products.filter(p => p.sellerId === profileUser.id);
  const userOrders = isOwn ? State.orders : [];
  const userReviews = Object.values(MOCK_REVIEWS).flat().filter(r => {
    // Reviews for products sold by this user
    const sellerProducts = State.products.filter(p => p.sellerId === profileUser.id).map(p => p.id);
    return false; // simplified — show empty for now
  });

  document.getElementById('profile-root').innerHTML = `
    <!-- HEADER -->
    <div class="profile-header">
      <div class="profile-header-inner">
        <div class="profile-avatar-wrap">
          <div class="profile-avatar">${profileUser.avatar}</div>
          ${profileUser.role === 'seller' ? `<div class="profile-avatar-badge">✓</div>` : ''}
        </div>
        <div class="profile-meta">
          <div class="profile-name">${profileUser.name}</div>
          <div class="profile-career">${profileUser.career}</div>
          <div style="margin-bottom:14px;">${renderStars(profileUser.rating||0)} <span style="color:rgba(255,255,255,0.7);font-size:13px;">${profileUser.rating||'Sin reseñas'}</span></div>
          <div class="profile-stats-row">
            <div class="profile-stat"><div class="profile-stat-val">${userProducts.length}</div><div class="profile-stat-label">Publicaciones</div></div>
            <div class="profile-stat"><div class="profile-stat-val">${profileUser.sales||0}</div><div class="profile-stat-label">Ventas</div></div>
            <div class="profile-stat"><div class="profile-stat-val">${profileUser.rating||'—'}</div><div class="profile-stat-label">Reputación</div></div>
            <div class="profile-stat"><div class="profile-stat-val">${new Date(profileUser.joinDate).getFullYear()}</div><div class="profile-stat-label">Miembro desde</div></div>
          </div>
        </div>
        <div class="profile-actions">
          ${isOwn
            ? `<button class="btn btn-gold-solid" onclick="window.location.href='07_publish.html'">+ Publicar producto</button>`
            : `<button class="btn btn-secondary" style="border-color:rgba(255,255,255,0.4);color:#fff;" onclick="contactUser()">💬 Enviar mensaje</button>
               <button class="btn" style="background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.8);font-size:13px;" onclick="document.getElementById('report-modal').style.display='flex'">⚑ Reportar</button>`
          }
        </div>
      </div>
    </div>

    <!-- TABS -->
    <div class="profile-tabs">
      <div class="profile-tabs-inner">
        <div class="profile-tab ${activeTab==='productos'?'active':''}" onclick="switchTab('productos')">Productos publicados</div>
        ${isOwn ? `<div class="profile-tab ${activeTab==='historial'?'active':''}" onclick="switchTab('historial')">Historial de compras</div>` : ''}
        <div class="profile-tab ${activeTab==='resenas'?'active':''}" onclick="switchTab('resenas')">Reseñas recibidas</div>
        ${isOwn ? `<div class="profile-tab ${activeTab==='config'?'active':''}" onclick="switchTab('config')">Configuración</div>` : ''}
      </div>
    </div>

    <!-- CONTENT -->
    <div class="profile-content fade-in" id="tab-content"></div>
  `;

  renderTab(activeTab);
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.profile-tab').forEach(t => t.classList.toggle('active', t.textContent.trim().toLowerCase().includes(tab.slice(0,4))));
  renderTab(tab);
}

function renderTab(tab) {
  const content = document.getElementById('tab-content');
  const userProducts = State.products.filter(p => p.sellerId === profileUser.id);
  const userOrders = State.orders;

  if (tab === 'productos') {
    if (userProducts.length === 0) {
      content.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📦</div>
          <h3>${isOwn ? 'Aún no has publicado nada' : 'Este usuario no tiene publicaciones'}</h3>
          <p>${isOwn ? 'Comparte tus materiales, servicios o conocimientos con la comunidad' : ''}</p>
          ${isOwn ? `<button class="btn btn-primary" onclick="window.location.href='07_publish.html'">✨ Publicar primer producto</button>` : ''}
        </div>`;
      return;
    }
    content.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
        <h2 style="font-size:20px;font-weight:700;color:var(--text)">${userProducts.length} publicacion${userProducts.length!==1?'es':''}</h2>
        ${isOwn ? `<button class="btn btn-primary" onclick="window.location.href='07_publish.html'">+ Nueva publicación</button>` : ''}
      </div>
      <div class="grid-3">
        ${userProducts.map(p => `
          <div class="card product-card" onclick="window.location.href='03_product.html?id=${p.id}'">
            <div class="product-card-img" style="background:${p.bg};">
              <span style="font-size:56px">${p.emoji}</span>
              ${p.stock===0?`<span class="badge badge-agotado" style="position:absolute;top:12px;right:12px">Agotado</span>`:''}
            </div>
            <div class="product-card-body">
              <div class="product-card-title">${p.title}</div>
              <div class="product-card-price" style="margin-bottom:8px">${formatPrice(p.price)}</div>
              ${isOwn ? `
              <div style="display:flex;gap:8px;margin-top:8px;">
                <button class="btn btn-secondary btn-sm" onclick="event.stopPropagation();editProduct(${p.id})">✏️ Editar</button>
                <button class="btn btn-sm" style="background:#fff0f0;color:#C0392B;border:1px solid #ffd5d5;" onclick="event.stopPropagation();deleteProduct(${p.id})">🗑️ Eliminar</button>
              </div>` : ''}
            </div>
          </div>
        `).join('')}
      </div>`;
  }

  else if (tab === 'historial') {
    if (userOrders.length === 0) {
      content.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🛍️</div><h3>Sin compras aún</h3><p>Explora el marketplace y encuentra lo que necesitas</p><button class="btn btn-primary" onclick="window.location.href='02_listing.html'">Explorar</button></div>`;
      return;
    }
    const statusColors = { pendiente: 'badge-pendiente', confirmada: 'badge-confirmada', entregada: 'badge-entregada' };
    const statusIcons = { pendiente: '⏳', confirmada: '✅', entregada: '📦' };
    const allProducts = State.products;
    content.innerHTML = `
      <h2 style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:24px;">${userOrders.length} orden${userOrders.length!==1?'es':''}</h2>
      ${userOrders.map(o => {
        const prod = allProducts.find(p => p.id === o.productId);
        return `
        <div class="order-item">
          <div class="order-emoji">${prod?.emoji||'📦'}</div>
          <div class="order-info">
            <div class="order-title">${o.productTitle}</div>
            <div class="order-meta">${o.id} · ${formatDate(o.date)} · Cantidad: ${o.qty||1}</div>
          </div>
          <div style="text-align:right">
            <div class="order-price">${formatPrice(o.price * (o.qty||1))}</div>
            <span class="badge ${statusColors[o.status]||'badge-pendiente'}" style="margin-top:6px;">${statusIcons[o.status]||''} ${o.status.charAt(0).toUpperCase()+o.status.slice(1)}</span>
          </div>
          <button class="btn btn-secondary btn-sm" onclick="window.location.href='03_product.html?id=${o.productId}'">Ver producto</button>
        </div>`;
      }).join('')}`;
  }

  else if (tab === 'resenas') {
    const allReviews = [];
    const userProds = State.products.filter(p => p.sellerId === profileUser.id);
    userProds.forEach(p => { if (MOCK_REVIEWS[p.id]) allReviews.push(...MOCK_REVIEWS[p.id].map(r => ({...r, productTitle: p.title}))); });
    if (allReviews.length === 0) {
      content.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⭐</div><h3>Sin reseñas aún</h3><p>Las reseñas aparecerán aquí cuando realices ventas</p></div>`;
      return;
    }
    const avg = (allReviews.reduce((s,r)=>s+r.rating,0)/allReviews.length).toFixed(1);
    content.innerHTML = `
      <div style="display:flex;align-items:center;gap:16px;margin-bottom:32px;background:#fff;border:1px solid var(--border);border-radius:12px;padding:24px;">
        <div style="text-align:center;flex-shrink:0"><div style="font-size:48px;font-weight:700;color:var(--blue-dark);line-height:1">${avg}</div><div>${renderStars(parseFloat(avg))}</div><div style="font-size:12px;color:var(--muted);margin-top:4px">${allReviews.length} reseñas</div></div>
        <div style="flex:1;padding-left:24px;border-left:1px solid var(--border)">
          ${[5,4,3,2,1].map(s => { const count = allReviews.filter(r=>r.rating===s).length; const pct = Math.round(count/allReviews.length*100); return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:13px;"><span style="width:14px;text-align:right">${s}</span><span style="color:#E5B800">★</span><div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="width:${pct}%;height:100%;background:var(--gold);border-radius:3px;"></div></div><span style="width:28px;color:var(--muted)">${count}</span></div>`; }).join('')}
        </div>
      </div>
      ${allReviews.map(r => `
        <div style="background:#fff;border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:12px;">
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
            <div style="width:36px;height:36px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:18px;">${r.avatar}</div>
            <div><div style="font-weight:600;font-size:14px">${r.userName}</div><div style="font-size:11px;color:var(--muted)">${r.productTitle}</div></div>
            <div style="margin-left:auto;text-align:right">${renderStars(r.rating)}<div style="font-size:11px;color:var(--muted);margin-top:2px">${formatDate(r.date)}</div></div>
          </div>
          <div style="font-size:14px;color:var(--text);line-height:1.6">${r.comment}</div>
        </div>
      `).join('')}`;
  }

  else if (tab === 'config') {
    content.innerHTML = `
      <div class="config-card">
        <h3>Información personal</h3>
        <div class="form-group">
          <label class="form-label">Nombre completo</label>
          <input type="text" class="form-input" id="cfg-name" value="${profileUser.name}">
        </div>
        <div class="form-group">
          <label class="form-label">Carrera</label>
          <select class="form-input" id="cfg-career">
            ${['Administración de Empresas','Comunicación Social','Derecho','Diseño Gráfico','Enfermería','Ingeniería de Sistemas','Ingeniería Industrial','Lenguas Modernas','Medicina','Psicología','Química Farmacéutica'].map(c=>`<option ${c===profileUser.career?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <button class="btn btn-primary" onclick="saveConfig()">Guardar cambios</button>
      </div>
      <div class="config-card" style="margin-top:24px;">
        <h3>Cambiar contraseña</h3>
        <div class="form-group"><label class="form-label">Contraseña actual</label><input type="password" class="form-input" placeholder="••••••••"></div>
        <div class="form-group"><label class="form-label">Nueva contraseña</label><input type="password" class="form-input" placeholder="Mínimo 6 caracteres"></div>
        <div class="form-group"><label class="form-label">Confirmar nueva contraseña</label><input type="password" class="form-input" placeholder="Repite la contraseña"></div>
        <button class="btn btn-secondary" onclick="showToast('Contraseña actualizada ✅','success')">Actualizar contraseña</button>
      </div>
      <div class="config-card" style="margin-top:24px;border-color:#ffd5d5;">
        <h3 style="color:#C0392B">Zona de peligro</h3>
        <p style="font-size:14px;color:var(--muted);margin-bottom:16px;">Estas acciones son irreversibles</p>
        <button class="btn" style="background:#fff0f0;color:#C0392B;border:1px solid #ffd5d5;" onclick="logout()">🚪 Cerrar sesión</button>
      </div>`;
  }
}

function saveConfig() {
  const user = State.user;
  if (!user) return;
  user.name = document.getElementById('cfg-name').value;
  user.career = document.getElementById('cfg-career').value;
  State.user = user;
  showToast('Perfil actualizado ✅', 'success');
  setTimeout(() => window.location.reload(), 800);
}

function editProduct(id) {
  window.location.href = '07_publish.html?edit=' + id;
}

function deleteProduct(id) {
  if (!confirm('¿Eliminar este producto?')) return;
  State.products = State.products.filter(p => p.id !== id);
  showToast('Producto eliminado', 'info');
  render();
}

function contactUser() {
  if (!currentUser) { window.location.href = '05_login.html'; return; }
  showToast('Función de mensajería directa próximamente', 'info');
}

function submitReport() {
  const reason = document.getElementById('report-reason').value;
  if (!reason) { showToast('Selecciona un motivo', 'warning'); return; }
  document.getElementById('report-modal').style.display = 'none';
  showToast('Reporte enviado. Lo revisaremos pronto 🛡️', 'success');
}

document.getElementById('report-modal').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});

render();
</script>
</body>
</html>
